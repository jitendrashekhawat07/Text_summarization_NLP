<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Text Summarizer</title>

    <style>

        body{
            font-family: Arial, Helvetica, sans-serif;
            margin:0;
            padding:0;
            background:#fff7ed;
        }

        .container{
            max-width:700px;
            margin:50px auto;
            background:white;
            padding:25px;
            border-radius:12px;
            box-shadow:0px 5px 15px rgba(0,0,0,0.2);
        }

        h1{
            text-align:center;
            color:#fb923c;
            margin-bottom:5px;
        }

        h3{
            text-align:center;
            color:#555;
            margin-top:0;
        }

        p{
            text-align:center;
        }

        form{
            display:flex;
            flex-direction:column;
            gap:15px;
        }

        textarea{
            width:100%;
            height:180px;
            padding:12px;
            border:1px solid #ccc;
            border-radius:8px;
            resize:none;
            font-size:16px;
            box-sizing:border-box;
        }

        button{
            padding:12px;
            border:none;
            border-radius:8px;
            background:#fb923c;
            color:white;
            font-size:18px;
            cursor:pointer;
        }

        button:hover{
            background:#ea580c;
        }

        #summary-output{
            margin-top:25px;
            background:#f9f9f9;
            border:1px solid #ddd;
            border-radius:8px;
            padding:15px;
            display:none;
        }

        #summary-heading{
            margin-top:0;
            color:#fb923c;
        }

    </style>

</head>

<body>

<div class="container">

    <h1>Text Summarizer</h1>

    <h3>Using Hugging Face Transformer</h3>

    <p>Enter your text below and click Summarize.</p>

    <form id="summarization-form">

        <textarea
            id="dialogue-input"
            placeholder="Enter your text here..."
        ></textarea>

        <button type="submit">
            Summarize
        </button>

    </form>

    <div id="summary-output">

        <h3 id="summary-heading">Summary</h3>

        <p id="summary-text"></p>

    </div>

</div>

<script>

document.getElementById("summarization-form").addEventListener("submit", async function(e){

    e.preventDefault();

    const dialogueInput = document.getElementById("dialogue-input");

    const summaryOutput = document.getElementById("summary-output");

    const summaryText = document.getElementById("summary-text");

    const submitButton = document.querySelector("button");

    const dialogue = dialogueInput.value.trim();

    if(dialogue===""){
        alert("Please enter some text.");
        return;
    }

    summaryOutput.style.display="block";
    summaryText.innerText="Processing...";
    submitButton.disabled=true;

    try{

        const response = await fetch("/summarize/",{

            method:"POST",

            headers:{
                "Content-Type":"application/json"
            },

            body:JSON.stringify({
                dialogue:dialogue
            })

        });

        if(!response.ok){

            throw new Error(`Server Error : ${response.status}`);

        }

        const data = await response.json();

        summaryText.innerText=data.summary;

    }

    catch(err){

        summaryText.innerText="Error : "+err.message;

    }

    finally{

        submitButton.disabled=false;

    }

});

</script>

</body>
</html>
